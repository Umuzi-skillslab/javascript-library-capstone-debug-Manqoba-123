<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="The service of the library management on your palm" />
    <title>Library Management System</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Digital Library System</h1>
        
        <nav role="tablist" aria-label="Main navigation">
          <button 
            id="catalogue-tab" 
            role="tab" 
            aria-selected="true" 
            aria-controls="catalogue-section">
            Catalogue
          </button>
          <button 
            id="members-tab" 
            role="tab" 
            aria-selected="false" 
            aria-controls="member-section">
            Members
          </button>
          <button 
            id="statistics-tab" 
            role="tab" 
            aria-selected="false" 
            aria-controls="statistics-section">
            Statistics
          </button>
        </nav>
      </header>

      <main>
        <!-- Catalogue Section -->
        <section id="catalogue-section" role="tabpanel" aria-labelledby="catalogue-tab">
          <h2>Catalogue</h2>
          
          <div class="controls">
            <label for="search">Search books</label>
            <input type="text" id="search" placeholder="Search books..." />
            
            <label for="filter-category">Category</label>
            <select id="filter-category">
              <option value="all">All Categories</option>
              <option value="fiction">Fiction</option>
              <option value="non-fiction">Non-Fiction</option>
              <option value="reference">Reference</option>
            </select>
          </div>

          <div id="catalogue-list" class="book-grid" role="list" aria-label="Book catalogue">
            <!-- Books rendered here dynamically -->
          </div>

          <div id="book-details" role="region" aria-live="polite" aria-label="Book details">
            <!-- Selected book details -->
          </div>
        </section>

        <!-- Borrow Section -->
        <section id="borrow-section">
          <h2>Borrow a Book</h2>
          
          <form id="borrow-form" aria-labelledby="borrow-section">
            <div class="form-group">
              <label for="member-id">Member ID</label>
              <input type="text" id="member-id" placeholder="Member ID" required />
            </div>
            
            <div class="form-group">
              <label for="isbn">ISBN</label>
              <input type="text" id="isbn" placeholder="ISBN" required />
            </div>
            
            <button type="submit">Borrow Book</button>
          </form>
        </section>

        <!-- Members Section -->
        <section id="member-section" role="tabpanel" aria-labelledby="members-tab" hidden>
          <h2>Member Management</h2>
          
          <div id="member-form">
            <!-- Member form rendered here -->
          </div>
          
          <div id="member-list" role="list" aria-label="Members list">
            <!-- Members list rendered here -->
          </div>
        </section>

        <!-- Statistics Section -->
        <section id="statistics-section" role="tabpanel" aria-labelledby="statistics-tab" hidden>
          <h2>Library Statistics</h2>
          
          <div class="stats-grid">
            <div class="stat-card">
              <h3>Total Books</h3>
              <p class="total-books" aria-live="polite">0</p>
            </div>
            <div class="stat-card">
              <h3>Total Members</h3>
              <p class="total-members" aria-live="polite">0</p>
            </div>
            <div class="stat-card">
              <h3>Books Borrowed</h3>
              <p class="books-borrowed" aria-live="polite">0</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Scripts -->
    <script src="library.js"></script>
    <script src="ui.js"></script>
  </body>
</html>
